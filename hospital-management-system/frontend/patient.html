<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patients - Hospital Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-hospital"></i>
            <h2>HMS Dashboard</h2>
        </div>
        <ul class="nav">
            <li><a href="index.html"><i class="fa-solid fa-house"></i> <span>Dashboard</span></a></li>
            <li class="active"><a href="patient.html"><i class="fa-solid fa-bed"></i> <span>Patients</span></a></li>
            <li><a href="doctor.html"><i class="fa-solid fa-user-doctor"></i> <span>Doctors</span></a></li>
            <li><a href="appointment.html"><i class="fa-solid fa-calendar-check"></i> <span>Appointments</span></a></li>
            <li><a href="billing.html"><i class="fa-solid fa-file-invoice-dollar"></i> <span>Billing</span></a></li>
        </ul>
    </div>
    
    <div class="main-content">
        <header>
            <div class="header-title">
                <h1>Patient Management</h1>
                <p>Manage hospital patient records</p>
            </div>
            <button class="btn" onclick="openModal('patientModal')">
                <i class="fa-solid fa-plus"></i> Add Patient
            </button>
        </header>

        <div class="section-box">
            <table id="patients-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Gender</th>
                        <th>Phone</th>
                        <th>Address</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JS populates this -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Patient Modal -->
    <div class="modal" id="patientModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="patientModalTitle">Add New Patient</h2>
                <button class="close-modal" onclick="closeModal('patientModal')">&times;</button>
            </div>
            <form id="patientForm" onsubmit="event.preventDefault(); savePatient();">
                <input type="hidden" id="patientId">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="patientName" class="form-control" required>
                </div>
                <div style="display:flex; gap:15px;">
                    <div class="form-group" style="flex:1;">
                        <label>Age</label>
                        <input type="number" id="patientAge" class="form-control" required>
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>Gender</label>
                        <select id="patientGender" class="form-control" required>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="patientPhone" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="patientAddress" class="form-control" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-sm" style="background:#f1f5f9; color:#64748b;" onclick="closeModal('patientModal')">Cancel</button>
                    <button type="submit" class="btn">Save Patient</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', fetchPatients);
    </script>
</body>
</html>
