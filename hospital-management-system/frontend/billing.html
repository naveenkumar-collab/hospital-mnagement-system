<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing - Hospital Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-hospital"></i>
            <h2>HMS Dashboard</h2>
        </div>
        <ul class="nav">
            <li><a href="index.html"><i class="fa-solid fa-house"></i> <span>Dashboard</span></a></li>
            <li><a href="patient.html"><i class="fa-solid fa-bed"></i> <span>Patients</span></a></li>
            <li><a href="doctor.html"><i class="fa-solid fa-user-doctor"></i> <span>Doctors</span></a></li>
            <li><a href="appointment.html"><i class="fa-solid fa-calendar-check"></i> <span>Appointments</span></a></li>
            <li class="active"><a href="billing.html"><i class="fa-solid fa-file-invoice-dollar"></i> <span>Billing</span></a></li>
        </ul>
    </div>
    
    <div class="main-content">
        <header>
            <div class="header-title">
                <h1>Billing Management</h1>
                <p>Process patient payments and invoices</p>
            </div>
            <button class="btn" onclick="openModal('billingModal'); fetchBillingDropdownData();">
                <i class="fa-solid fa-plus"></i> Create Bill
            </button>
        </header>

        <div class="section-box">
            <table id="billings-table">
                <thead>
                    <tr>
                        <th>Bill ID</th>
                        <th>Patient ID</th>
                        <th>Amount ($)</th>
                        <th>Date</th>
                        <th>Payment Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal" id="billingModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="billingModalTitle">Create New Bill</h2>
                <button class="close-modal" onclick="closeModal('billingModal')">&times;</button>
            </div>
            <form id="billingForm" onsubmit="event.preventDefault(); saveBilling();">
                <input type="hidden" id="billId">
                <div class="form-group">
                    <label>Patient</label>
                    <select id="billingPatient" class="form-control" required>
                    </select>
                </div>
                <div class="form-group">
                    <label>Amount ($)</label>
                    <input type="number" step="0.01" id="billingAmount" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Payment Method/Status</label>
                    <select id="billingStatus" class="form-control" required>
                        <option value="Pending">Pending</option>
                        <option value="Paid">Paid</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="billingDate" class="form-control" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-sm" style="background:#f1f5f9; color:#64748b;" onclick="closeModal('billingModal')">Cancel</button>
                    <button type="submit" class="btn">Save Bill</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', fetchBillings);
    </script>
</body>
</html>
